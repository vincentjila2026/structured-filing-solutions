<style>
/* ============================================================
   ROOT THEME — FUTURISTIC NEON
============================================================ */
:root{
  --bg:#040810;
  --bg2:#070d1a;
  --bg3:#0b1221;
  --surface:rgba(255,255,255,0.04);
  --surface2:rgba(255,255,255,0.08);
  --border:rgba(255,255,255,0.1);
  --border2:rgba(0,210,255,0.3);
  --cyan:#00d2ff;
  --cyan2:#00a4d6;
  --cyanSoft:rgba(0,210,255,0.07);
  --white:#f0f4f7;
  --white2:rgba(240,244,248,0.7);
  --white3:rgba(240,244,248,0.4);
  --muted:rgba(240,244,248,0.25);
  --radius:14px;
  --transition:0.25s ease;
}

/* RESET */
*,*::before,*::after{box-sizing:border-box;padding:0;margin:0;}
body{
  font-family:'Outfit',sans-serif;
  background:var(--bg);
  color:var(--white);
  line-height:1.7;
  overflow-x:hidden;
}

/* Scrollbar */
::-webkit-scrollbar{width:6px;}
::-webkit-scrollbar-thumb{background:var(--cyan2);border-radius:4px;}

/* Background grid */
.grid-bg{
  position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(0,210,255,0.04) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,210,255,0.04) 1px,transparent 1px);
  background-size:80px 80px;
}

/* ============================================================
   HEADER
============================================================ */
.site-header{
  position:fixed;top:0;left:0;right:0;
  padding:0.8rem 0;z-index:50;
  transition:background 0.3s ease, backdrop-filter 0.3s ease;
}
.site-header.scrolled{
  background:rgba(4,8,16,0.8);
  backdrop-filter:blur(15px);
  border-bottom:1px solid var(--border);
}
.header-inner{
  max-width:1400px;margin:0 auto;padding:0 5%;
  display:flex;justify-content:space-between;align-items:center;
}
.brand-logo{
  width:38px;height:38px;
  border-radius:10px;
  background:linear-gradient(135deg,var(--cyan),var(--cyan2));
  display:flex;align-items:center;justify-content:center;
  font-family:'JetBrains Mono';font-size:0.8rem;font-weight:700;
  color:var(--bg);
}
.brand-name{font-family:'Syne';font-size:1rem;font-weight:700;}
.brand-sub{
  font-family:'JetBrains Mono';font-size:0.55rem;color:var(--cyan);
  letter-spacing:0.14em;text-transform:uppercase;
}
.nav a{
  color:var(--white3);text-decoration:none;
  padding:0.4rem 0.8rem;font-size:0.8rem;border-radius:6px;
}
.nav a:hover{color:var(--white);background:var(--surface);}
.nav .cta{
  margin-left:0.6rem;
  background:var(--cyan);color:var(--bg);
  font-weight:600;border-radius:8px;
  padding:0.5rem 1rem;
}

/* ============================================================
   HERO
============================================================ */
.hero{
  min-height:100vh;
  display:flex;align-items:center;
  position:relative;overflow:hidden;
}
.aurora-blob{
  position:absolute;border-radius:50%;filter:blur(85px);
